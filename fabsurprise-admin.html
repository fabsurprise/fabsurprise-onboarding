<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabsurprise Admin — Journey Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --wine: #7A1428;
  --wine-dark: #5A0E1C;
  --gold: #C9A84C;
  --gold-pale: #F9F3E3;
  --ivory: #F5F0E8;
  --ivory-mid: #EDE7DC;
  --ivory-dark: #DDD5C5;
  --white: #FDFAF6;
  --text-dark: #1A0A0E;
  --text-mid: #4A2030;
  --text-light: #8B6B5A;
  --green: #2E7D32;
}

body { font-family: 'Inter', sans-serif; background: var(--ivory); color: var(--text-dark); min-height: 100vh; }

/* LOGIN */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  background: var(--wine-dark);
}

.login-box {
  background: var(--ivory);
  padding: 40px 32px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}

.login-brand {
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--wine);
  margin-bottom: 24px;
  font-weight: 500;
}

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  color: var(--text-dark);
  margin-bottom: 8px;
}

.login-sub { font-size: 13px; color: var(--text-light); margin-bottom: 28px; }

.login-input {
  width: 100%;
  border: 1px solid var(--ivory-dark);
  background: var(--white);
  padding: 14px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  margin-bottom: 14px;
  text-align: center;
  letter-spacing: 3px;
}

.login-input:focus { border-color: var(--wine); }

.btn-login {
  width: 100%;
  background: var(--wine);
  color: white;
  border: none;
  padding: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}

.login-error { font-size: 12px; color: #B02020; margin-top: 10px; display: none; }

/* HEADER */
.admin-header {
  background: var(--wine-dark);
  border-bottom: 3px solid var(--gold);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.admin-brand { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.admin-logout { font-size: 11px; color: rgba(245,240,232,0.5); cursor: pointer; background: none; border: none; text-decoration: underline; }

/* MAIN */
.admin-body { max-width: 640px; margin: 0 auto; padding: 32px 20px 80px; }

.admin-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 30px;
  color: var(--text-dark);
  margin-bottom: 6px;
}

.admin-sub { font-size: 13px; color: var(--text-light); margin-bottom: 28px; }

/* SEARCH */
.search-box {
  background: var(--white);
  border: 1px solid var(--ivory-dark);
  padding: 28px 24px;
  margin-bottom: 24px;
}

.search-label {
  font-size: 10.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-mid);
  font-weight: 600;
  margin-bottom: 10px;
  display: block;
}

.search-row { display: flex; gap: 10px; }

.search-input {
  flex: 1;
  border: 1px solid var(--ivory-dark);
  background: var(--ivory);
  padding: 13px 14px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
}

.search-input:focus { border-color: var(--wine); }

.btn-search {
  background: var(--wine);
  color: white;
  border: none;
  padding: 13px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  white-space: nowrap;
}

/* CLIENT CARD */
.client-card {
  background: var(--white);
  border: 1px solid var(--ivory-dark);
  margin-bottom: 16px;
  overflow: hidden;
}

.client-card-header {
  background: var(--wine);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.client-card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--white);
  font-weight: 400;
}

.client-card-ref { font-size: 10px; color: rgba(245,240,232,0.5); letter-spacing: 1px; }

.client-details { padding: 16px 18px; border-bottom: 1px solid var(--ivory-mid); }

.detail-row {
  display: flex;
  gap: 12px;
  margin-bottom: 6px;
  align-items: flex-start;
}

.detail-key {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-light);
  min-width: 90px;
  flex-shrink: 0;
  padding-top: 1px;
}

.detail-val { font-size: 13px; color: var(--text-dark); line-height: 1.5; }

/* STAGE UPDATE */
.stage-update { padding: 18px; }

.stage-update-label {
  font-size: 10.5px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-mid);
  font-weight: 600;
  margin-bottom: 12px;
  display: block;
}

.stage-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.stage-btn {
  padding: 12px 10px;
  border: 1.5px solid var(--ivory-dark);
  background: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.stage-btn:hover { border-color: var(--wine); color: var(--wine); }
.stage-btn.selected { border-color: var(--wine); background: var(--wine); color: white; }
.stage-btn.current-stage { border-color: var(--gold); background: var(--gold-pale); color: var(--text-dark); font-weight: 600; }

.btn-update {
  width: 100%;
  background: var(--gold);
  color: var(--wine-dark);
  border: none;
  padding: 14px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-update:hover { background: var(--gold-light); }
.btn-update:disabled { opacity: 0.5; pointer-events: none; }

/* JOURNEY LINK */
.journey-link-box {
  margin-top: 14px;
  background: var(--ivory);
  border: 1px solid var(--ivory-dark);
  padding: 14px 16px;
}

.journey-link-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-light); margin-bottom: 6px; }

.journey-link-url {
  font-size: 11.5px;
  color: var(--wine);
  word-break: break-all;
  line-height: 1.5;
  margin-bottom: 10px;
}

.btn-copy-link {
  background: var(--wine);
  color: white;
  border: none;
  padding: 9px 18px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
  margin-right: 8px;
}

.btn-wa-share {
  background: #25D366;
  color: white;
  border: none;
  padding: 9px 18px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
}

/* SUCCESS TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text-dark);
  color: white;
  padding: 12px 24px;
  font-size: 13px;
  z-index: 999;
  transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ALL CLIENTS */
.all-clients-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  margin-top: 32px;
}

.all-clients-title { font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); }

.btn-load-all {
  background: transparent;
  border: 1px solid var(--ivory-dark);
  color: var(--text-mid);
  padding: 8px 14px;
  font-size: 11px;
  cursor: pointer;
}

.loading-inline { font-size: 13px; color: var(--text-light); text-align: center; padding: 24px; }

.stage-badge {
  display: inline-block;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-radius: 2px;
}

.badge-planning { background: #EDE7DC; color: #4A2030; }
.badge-design { background: #E8F0FE; color: #1A3A7A; }
.badge-create { background: #FFF3E0; color: #7A3A00; }
.badge-celebrate { background: #F9F3E3; color: #7A5A00; }
.badge-preserve { background: #F3E5F5; color: #5A0A5A; }
.badge-continue { background: #E8F5E9; color: #1B5E20; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-brand">Fabsurprise</div>
    <h2 class="login-title">Admin Access</h2>
    <p class="login-sub">Enter your admin password to continue.</p>
    <input class="login-input" type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="btn-login" onclick="checkPassword()">Enter</button>
    <p class="login-error" id="loginError">Incorrect password. Please try again.</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

  <div class="admin-header">
    <div class="admin-brand">Fabsurprise Admin</div>
    <button class="admin-logout" onclick="logout()">Sign out</button>
  </div>

  <div class="admin-body">
    <h1 class="admin-title">Journey Manager</h1>
    <p class="admin-sub">Search a client by their reference number or name to update their celebration stage.</p>

    <div class="search-box">
      <label class="search-label">Find a Client</label>
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="FAB-reference or client name" onkeydown="if(event.key==='Enter')searchClient()">
        <button class="btn-search" onclick="searchClient()">Search</button>
      </div>
    </div>

    <div id="searchResult"></div>

    <div class="all-clients-header">
      <span class="all-clients-title">All Active Celebrations</span>
      <button class="btn-load-all" onclick="loadAllClients()">Load All</button>
    </div>

    <div id="allClients"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgG8ay4zJ13aAlld-JfCM7KEJ1Bk3cViHziqgeQK0n0js3sl91vxq810IxudwBVCuCDA/exec';
const ADMIN_PASSWORD = 'fab2024admin';
const JOURNEY_BASE_URL = 'https://fabsurprise.github.io/fabsurprise-onboarding/fabsurprise-journey.html';
const WA_NUMBER = '2349025141322';

const STAGES = ['Planning', 'Design', 'Create', 'Celebrate', 'Preserve', 'Continue'];

const BADGE_CLASS = {
  'Planning': 'badge-planning',
  'Design': 'badge-design',
  'Create': 'badge-create',
  'Celebrate': 'badge-celebrate',
  'Preserve': 'badge-preserve',
  'Continue': 'badge-continue',
};

function checkPassword() {
  const pwd = document.getElementById('passwordInput').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    sessionStorage.setItem('fab_admin', '1');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  sessionStorage.removeItem('fab_admin');
  location.reload();
}

if (sessionStorage.getItem('fab_admin')) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
}

function journeyLink(ref) {
  return `${JOURNEY_BASE_URL}?ref=${encodeURIComponent(ref)}`;
}

function renderClientCard(client, container, prepend) {
  const ref = client.submissionId || client['Submission ID'] || '';
  const name = client.clientName || client['Client Name'] || '';
  const phone = client.clientPhone || client['Client Phone'] || '';
  const occasion = client.occasion || client['Occasion'] || '';
  const celebDate = client.celebDate || client['Celebration Date'] || '';
  const recipientName = client.recipientName || client['Recipient Name'] || '';
  const currentStage = client.status || client['Status'] || 'Planning';
  const link = journeyLink(ref);

  const card = document.createElement('div');
  card.className = 'client-card';
  card.id = `card-${ref}`;

  card.innerHTML = `
    <div class="client-card-header">
      <div>
        <div class="client-card-name">${name}</div>
        <div class="client-card-ref">${ref}</div>
      </div>
      <span class="stage-badge ${BADGE_CLASS[currentStage] || 'badge-planning'}" id="badge-${ref}">${currentStage}</span>
    </div>
    <div class="client-details">
      <div class="detail-row"><span class="detail-key">Occasion</span><span class="detail-val">${occasion}</span></div>
      <div class="detail-row"><span class="detail-key">Celebrating</span><span class="detail-val">${recipientName || '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Date</span><span class="detail-val">${celebDate || '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${phone || '—'}</span></div>
    </div>
    <div class="stage-update">
      <label class="stage-update-label">Update Stage</label>
      <div class="stage-grid" id="stages-${ref}">
        ${STAGES.map(s => `
          <button class="stage-btn ${s === currentStage ? 'current-stage' : ''}" 
                  id="stage-${ref}-${s}"
                  onclick="selectStage('${ref}', '${s}')">
            ${s}
          </button>
        `).join('')}
      </div>
      <button class="btn-update" id="updateBtn-${ref}" onclick="updateStage('${ref}')" disabled>
        Update Stage
      </button>
      <div class="journey-link-box" style="margin-top:14px;">
        <div class="journey-link-label">Client Journey Link</div>
        <div class="journey-link-url">${link}</div>
        <button class="btn-copy-link" onclick="copyLink('${link}', this)">Copy Link</button>
        <button class="btn-wa-share" onclick="shareOnWa('${link}', '${name}', '${ref}')">Share on WhatsApp</button>
      </div>
    </div>
  `;

  if (prepend && container.firstChild) {
    container.insertBefore(card, container.firstChild);
  } else {
    container.appendChild(card);
  }
}

let selectedStages = {};

function selectStage(ref, stage) {
  selectedStages[ref] = stage;
  STAGES.forEach(s => {
    const btn = document.getElementById(`stage-${ref}-${s}`);
    if (btn) btn.classList.remove('selected');
  });
  const selected = document.getElementById(`stage-${ref}-${stage}`);
  if (selected) selected.classList.add('selected');
  const updateBtn = document.getElementById(`updateBtn-${ref}`);
  if (updateBtn) updateBtn.disabled = false;
}

async function updateStage(ref) {
  const newStage = selectedStages[ref];
  if (!newStage) return;

  const btn = document.getElementById(`updateBtn-${ref}`);
  btn.textContent = 'Updating...';
  btn.disabled = true;

  try {
    const response = await fetch(`${APPS_SCRIPT_URL}?action=updateStage&ref=${encodeURIComponent(ref)}&stage=${encodeURIComponent(newStage)}`);
    const data = await response.json();
    if (data.success) {
      const badge = document.getElementById(`badge-${ref}`);
      if (badge) {
        badge.textContent = newStage;
        badge.className = `stage-badge ${BADGE_CLASS[newStage] || 'badge-planning'}`;
      }
      STAGES.forEach(s => {
        const stageBtn = document.getElementById(`stage-${ref}-${s}`);
        if (stageBtn) {
          stageBtn.classList.remove('current-stage', 'selected');
          if (s === newStage) stageBtn.classList.add('current-stage');
        }
      });
      btn.textContent = 'Update Stage';
      showToast(`Stage updated to ${newStage} successfully!`);
    } else {
      btn.textContent = 'Update Stage';
      btn.disabled = false;
      showToast('Update failed. Please try again.');
    }
  } catch (err) {
    btn.textContent = 'Update Stage';
    btn.disabled = false;
    showToast('Connection error. Please try again.');
  }
}

async function searchClient() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;

  const container = document.getElementById('searchResult');
  container.innerHTML = '<div class="loading-inline">Searching...</div>';

  try {
    const response = await fetch(`${APPS_SCRIPT_URL}?action=search&query=${encodeURIComponent(query)}`);
    const data = await response.json();
    container.innerHTML = '';
    if (data.success && data.results && data.results.length > 0) {
      data.results.forEach(client => renderClientCard(client, container, false));
    } else {
      container.innerHTML = '<div class="loading-inline">No client found. Check the reference number or name.</div>';
    }
  } catch (err) {
    container.innerHTML = '<div class="loading-inline">Search failed. Please try again.</div>';
  }
}

async function loadAllClients() {
  const container = document.getElementById('allClients');
  container.innerHTML = '<div class="loading-inline">Loading all celebrations...</div>';

  try {
    const response = await fetch(`${APPS_SCRIPT_URL}?action=getAllClients`);
    const data = await response.json();
    container.innerHTML = '';
    if (data.success && data.clients && data.clients.length > 0) {
      data.clients.forEach(client => renderClientCard(client, container, false));
    } else {
      container.innerHTML = '<div class="loading-inline">No celebrations found yet.</div>';
    }
  } catch (err) {
    container.innerHTML = '<div class="loading-inline">Failed to load. Please try again.</div>';
  }
}

function copyLink(link, btn) {
  navigator.clipboard.writeText(link).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Link', 2000);
  });
}

function shareOnWa(link, name, ref) {
  const msg = encodeURIComponent(`Hi ${name}! 🎉 You can track your celebration journey with us here:\n\n${link}\n\nThis page will update as we progress through each stage. — Team Fabsurprise`);
  window.open(`https://wa.me/?text=${msg}`, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
